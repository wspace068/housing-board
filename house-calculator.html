<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 집 구매 가능 금액 계산기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;font-size:15px;color:#111;background:#f7f7f5;padding:1.5rem;min-height:100vh}
.container{max-width:720px;margin:0 auto;background:#fff;border-radius:16px;padding:1.75rem;border:1px solid #e5e5e3}
h2{font-size:18px;font-weight:600;margin-bottom:1.5rem;color:#111}
.section{margin-bottom:1.5rem}
.section-title{font-size:13px;font-weight:500;color:#888;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:13px;color:#666}
input[type=number],select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#111;outline:none}
input[type=number]:focus,select:focus{border-color:#999}
.toggle-group{display:flex}
.toggle-group button{flex:1;padding:8px;border:1px solid #ddd;background:#f5f5f3;color:#666;font-size:13px;cursor:pointer;transition:all 0.15s;font-family:inherit}
.toggle-group button:first-child{border-radius:8px 0 0 8px;border-right:none}
.toggle-group button:last-child{border-radius:0 8px 8px 0}
.toggle-group button.active{background:#111;color:#fff;border-color:#111}
.toggle-group button:disabled{opacity:0.4;cursor:not-allowed}
.divider{border:none;border-top:1px solid #eee;margin:1.5rem 0}
.result-card{background:#f8f8f6;border-radius:12px;padding:1.25rem;margin-bottom:12px}
.result-card.highlight{background:#fff;border:1px solid #ccc}
.grid-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.metric{display:flex;flex-direction:column;gap:4px}
.metric .mlabel{font-size:12px;color:#888}
.metric .mvalue{font-size:21px;font-weight:600;color:#111}
.metric .msub{font-size:12px;color:#777;margin-top:2px}
.grid-metrics3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0ee;font-size:14px}
.cost-row:last-child{border-bottom:none}
.cost-label{color:#666}
.cost-value{font-weight:500;color:#111}
.cost-row.total .cost-label,.cost-row.total .cost-value{font-weight:600;color:#111}
.badge-green{display:inline-block;font-size:11px;padding:2px 7px;border-radius:5px;margin-left:6px;background:#e6f4ea;color:#2d7a3a}
.badge-red{display:inline-block;font-size:11px;padding:2px 7px;border-radius:5px;background:#fdecea;color:#b71c1c}
.hint{font-size:12px;color:#999;margin-top:6px}
.green{color:#2d7a3a}
.red{color:#c62828}
.error-card{background:#fdecea;border-radius:12px;padding:1.25rem;color:#b71c1c;font-size:14px}
@media(max-width:480px){.grid2,.grid3,.grid-metrics,.grid-metrics3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h2>내 집 구매 가능 금액 계산기</h2>

<div class="section">
  <div class="section-title">소득 & 대출 조건</div>
  <div class="grid2">
    <div class="field">
      <label>연소득 (원천징수 기준, 만원)</label>
      <input type="number" id="income" value="0" step="100" min="0">
    </div>
    <div class="field">
      <label>보유 현금 (만원)</label>
      <input type="number" id="cash" value="0" step="500" min="0">
    </div>
    <div class="field">
      <label>최대 대출 기간</label>
      <select id="loanYear">
        <option value="30" selected>30년 (수도권 최대)</option>
        <option value="25">25년</option>
        <option value="20">20년</option>
        <option value="15">15년</option>
        <option value="40">40년 (지방만 가능)</option>
      </select>
    </div>
    <div class="field">
      <label>예상 대출 금리 (%)</label>
      <input type="number" id="rate" value="4" step="0.1" min="1" max="15">
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">주택 조건</div>
  <div class="grid3">
    <div class="field">
      <label>생애최초 여부</label>
      <div class="toggle-group">
        <button id="btn-first-y" class="active" onclick="setToggle('first','y')">생애최초</button>
        <button id="btn-first-n" onclick="setToggle('first','n')">아님</button>
      </div>
    </div>
    <div class="field">
      <label>지역</label>
      <div class="toggle-group">
        <button id="btn-region-metro" class="active" onclick="setToggle('region','metro')">수도권</button>
        <button id="btn-region-non" onclick="setToggle('region','non')">지방</button>
      </div>
    </div>
    <div class="field">
      <label>규제지역 여부</label>
      <div class="toggle-group">
        <button id="btn-reg-y" onclick="setToggle('reg','y')">규제지역</button>
        <button id="btn-reg-n" class="active" onclick="setToggle('reg','n')">비규제</button>
      </div>
    </div>
  </div>
  <p id="reg-hint" class="hint"></p>
</div>

<hr class="divider">
<div id="result-area"></div>
</div>

<script>
const state={first:'y',region:'metro',reg:'n'};

function setToggle(key,val){
  state[key]=val;
  document.querySelectorAll('[id^="btn-'+key+'-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+key+'-'+val).classList.add('active');
  if(key==='region'){
    const yBtn=document.getElementById('btn-reg-y');
    const nBtn=document.getElementById('btn-reg-n');
    if(val==='non'){
      yBtn.disabled=true; nBtn.disabled=true;
      state.reg='n';
      nBtn.classList.add('active'); yBtn.classList.remove('active');
    } else {
      yBtn.disabled=false; nBtn.disabled=false;
    }
  }
  calc();
}

function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtA(n){
  n=Math.round(n);
  if(n>=10000){
    const ok=Math.floor(n/10000);
    const man=n%10000;
    if(man===0) return ok+'억원';
    return ok+'억 '+fmt(man)+'만원';
  }
  return fmt(n)+'만원';
}

function monthlyPayment(principal,annualRate,months){
  const r=annualRate/12/100;
  if(r===0) return principal/months;
  return principal*r*Math.pow(1+r,months)/(Math.pow(1+r,months)-1);
}

function maxLoanByDSR(income,annualRate,stressRate,months){
  const monthlyLimit=income*10000*0.4/12;
  const r=(annualRate+stressRate)/12/100;
  if(r===0) return monthlyLimit*months;
  return monthlyLimit/r*(1-1/Math.pow(1+r,months));
}

function calcAcqTax(price,isFirst){
  let rate,edu,rural=0;
  if(price<=60000){rate=0.01;edu=0.001;}
  else if(price<=90000){rate=(price-60000)/30000*0.02+0.01;edu=rate*0.1;}
  else{rate=0.03;edu=0.003;rural=0.006;}
  let tax=Math.round(price*10000*(rate+edu+rural)/10000);
  let discount=0;
  if(isFirst==='y'){
    const rawTax=price*10000*(rate+edu+rural);
    if(price<=30000) discount=Math.round(rawTax/10000);
    else if(price<=60000) discount=Math.min(Math.round(rawTax*0.5/10000),200);
    else if(price<=90000) discount=Math.min(Math.round(rawTax*0.25/10000),200);
    else discount=200;
  }
  return{tax,discount};
}

function calcBroker(price){
  let r;
  if(price<=50000) r=0.006;
  else if(price<=90000) r=0.005;
  else r=0.007;
  return Math.round(price*r/100)*100;
}

function calcLegal(price){
  return Math.round((150+Math.min(price/10000,5)*10)/10)*10;
}

function calc(){
  const income=parseFloat(document.getElementById('income').value)||0;
  const cash=parseFloat(document.getElementById('cash').value)||0;
  const loanYear=parseInt(document.getElementById('loanYear').value)||30;
  const rate=parseFloat(document.getElementById('rate').value)||4;
  const months=loanYear*12;
  const{first,region,reg}=state;
  const isMetro=region==='metro';
  const isFirst=first==='y';

  let ltv=isFirst?0.7:(reg==='y'?0.4:0.7);
  if(!isMetro) ltv=0.7;

  const hint=document.getElementById('reg-hint');
  if(!isMetro) hint.textContent='지방은 규제지역 구분 없이 LTV 70% 적용';
  else if(reg==='y') hint.textContent='규제지역: 강남·서초·송파·용산구 해당 (생애최초도 LTV 70%)';
  else hint.textContent='비규제지역 기준 적용';

  const stressRate=isMetro?3:0.75;
  const maxByDSR=Math.round(maxLoanByDSR(income,rate,stressRate,months)/10000);
  const loanCap=isMetro?60000:9999999;
  let dsrCapLoan=Math.min(maxByDSR,loanCap);
  let limitReason=maxByDSR<=loanCap?'DSR 한도':'정부 대출 상한 ('+fmtA(loanCap)+')';

  function computeMaxPrice(loan){
    return Math.round(loan/ltv/100)*100;
  }

  const maxPriceByLoan=computeMaxPrice(dsrCapLoan);

  const acqEst=calcAcqTax(maxPriceByLoan,first);
  const legalEst=calcLegal(maxPriceByLoan);
  const brokerEst=calcBroker(maxPriceByLoan);
  const feeEst=acqEst.tax-acqEst.discount+legalEst+brokerEst;

  const realCash=cash-feeEst;
  if(realCash<0){
    document.getElementById('result-area').innerHTML=`<div class="error-card">현금이 부대비용(약 ${fmtA(feeEst)})에도 부족합니다. 현금을 늘려주세요.</div>`;
    return;
  }

  const maxPrice=Math.round((realCash+dsrCapLoan)/100)*100;
  const usedLoan=Math.min(Math.round(maxPrice*ltv/100)*100,dsrCapLoan,loanCap);

  const acq=calcAcqTax(maxPrice,first);
  const legal=calcLegal(maxPrice);
  const broker=calcBroker(maxPrice);
  const totalFee=acq.tax-acq.discount+legal+broker;
  const totalFeeRaw=acq.tax+legal+broker;

  const monthly=Math.round(monthlyPayment(usedLoan*10000,rate,months)/10000);
  const totalInterest=Math.round((monthly*months-usedLoan)/100)*100;
  const dsrRatio=Math.round(monthly*12/(income*0.01));
  const dsrColor=dsrRatio<=30?'green':dsrRatio<=40?'':' red';
  const dsrLabel=dsrRatio<=30?'안정':dsrRatio<=40?'주의':'위험';

  document.getElementById('result-area').innerHTML=`
  <div class="result-card highlight">
    <div class="grid-metrics" style="margin-bottom:1rem">
      <div class="metric">
        <span class="mlabel">최대 구매 가능 집값</span>
        <span class="mvalue">${fmtA(maxPrice)}</span>
        <span class="msub">순수 집값 기준</span>
      </div>
      <div class="metric">
        <span class="mlabel">부대비용 (별도 필요)</span>
        <span class="mvalue" style="font-size:18px">${fmtA(totalFee)}</span>
        <span class="msub">취득세+법무사+중개수수료${acq.discount>0?' (감면 적용)':''}</span>
      </div>
    </div>
    <div class="grid-metrics3">
      <div class="metric">
        <span class="mlabel">최대 대출액</span>
        <span class="mvalue" style="font-size:17px">${fmtA(usedLoan)}</span>
        <span class="msub">${limitReason}</span>
      </div>
      <div class="metric">
        <span class="mlabel">월 원리금 (${rate}%)</span>
        <span class="mvalue" style="font-size:17px">${fmtA(monthly)}</span>
      </div>
      <div class="metric">
        <span class="mlabel">월소득 대비 비율</span>
        <span class="mvalue ${dsrColor}" style="font-size:17px">${dsrRatio}%</span>
        <span class="msub">${dsrLabel}</span>
      </div>
    </div>
  </div>

  <div class="result-card">
    <div class="section-title">대출 한도 산정 근거</div>
    <div class="cost-row"><span class="cost-label">DSR 월 한도 (연소득 × 40% ÷ 12)</span><span class="cost-value">${fmtA(Math.round(income*10000*0.4/12/10000))}원/월</span></div>
    <div class="cost-row"><span class="cost-label">스트레스 금리 적용 (${rate}% + ${stressRate}% = ${rate+stressRate}%)</span><span class="cost-value">${isMetro?'수도권 +3%':'지방 +0.75%'}</span></div>
    <div class="cost-row"><span class="cost-label">DSR 기준 최대 대출</span><span class="cost-value">${fmtA(maxByDSR)}</span></div>
    <div class="cost-row"><span class="cost-label">LTV ${Math.round(ltv*100)}% (${isFirst?'생애최초':'일반 무주택'})</span><span class="cost-value">집값의 ${Math.round(ltv*100)}%까지</span></div>
    ${isMetro?`<div class="cost-row"><span class="cost-label">정부 대출 상한 (15억 이하 기준)</span><span class="cost-value">최대 6억원</span></div>`:''}
    <div class="cost-row total"><span class="cost-label">최종 대출 한도</span><span class="cost-value">${fmtA(usedLoan)}</span></div>
  </div>

  <div class="result-card">
    <div class="section-title">부대비용 상세</div>
    <div class="cost-row"><span class="cost-label">취득세 (원금)</span><span class="cost-value">${fmtA(acq.tax)}</span></div>
    ${acq.discount>0?`<div class="cost-row"><span class="cost-label">생애최초 취득세 감면 <span class="badge-green">감면</span></span><span class="cost-value green">-${fmtA(acq.discount)}</span></div>`:''}
    <div class="cost-row"><span class="cost-label">법무사 비용 (등기 대행)</span><span class="cost-value">약 ${fmtA(legal)}</span></div>
    <div class="cost-row"><span class="cost-label">중개수수료 (법정 최대 요율)</span><span class="cost-value">약 ${fmtA(broker)}</span></div>
    <div class="cost-row total"><span class="cost-label">부대비용 합계</span><span class="cost-value">${fmtA(totalFee)}</span></div>
  </div>

  <div class="result-card">
    <div class="section-title">자금 구성</div>
    <div class="cost-row"><span class="cost-label">보유 현금</span><span class="cost-value">${fmtA(cash)}</span></div>
    <div class="cost-row"><span class="cost-label">- 부대비용</span><span class="cost-value red">-${fmtA(totalFee)}</span></div>
    <div class="cost-row"><span class="cost-label">집값에 쓸 수 있는 현금</span><span class="cost-value">${fmtA(cash-totalFee)}</span></div>
    <div class="cost-row"><span class="cost-label">+ 대출</span><span class="cost-value">${fmtA(usedLoan)}</span></div>
    <div class="cost-row total"><span class="cost-label">최대 집값</span><span class="cost-value">${fmtA(maxPrice)}</span></div>
    <div class="cost-row"><span class="cost-label">30년 총 이자 (${rate}% 기준)</span><span class="cost-value">${fmtA(totalInterest)}</span></div>
  </div>`;
}

document.getElementById('income').addEventListener('input',calc);
document.getElementById('cash').addEventListener('input',calc);
document.getElementById('loanYear').addEventListener('change',calc);
document.getElementById('rate').addEventListener('input',calc);
calc();
</script>
</body>
</html>
